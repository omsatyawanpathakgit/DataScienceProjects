<!DOCTYPE html>
<html>
<head>
    <title>Google Play Store App Predictor</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            padding: 30px;
        }

        .container {
            width: 800px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
        }

        h1, h2 {
            text-align: center;
        }

        form {
            margin-bottom: 40px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px 0;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1a73e8;
            color: white;
            border: none;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        .result {
            background: #e8f0fe;
            padding: 15px;
            border-radius: 8px;
            font-size: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Google Play Store App Predictor</h1>

    {% if install_prediction %}
        <div class="result">{{ install_prediction }}</div>
    {% endif %}

    {% if performance_prediction %}
        <div class="result">{{ performance_prediction }}</div>
    {% endif %}

    <h2>Predict App Installs</h2>

    <form action="/predict_installs" method="POST">
        <label>Category</label>
        <input type="text" name="category" placeholder="GAME" required>

        <label>Rating</label>
        <input type="number" step="0.1" name="rating" placeholder="4.5" required>

        <label>Reviews</label>
        <input type="number" name="reviews" placeholder="10000" required>

        <label>Size</label>
        <input type="text" name="size" placeholder="25M" required>

        <label>Price</label>
        <input type="number" step="0.01" name="price" placeholder="0" required>

        <label>Content Rating</label>
        <input type="text" name="content_rating" placeholder="Everyone" required>

        <label>Main Genre</label>
        <input type="text" name="main_genre" placeholder="Arcade" required>

        <label>Last Updated</label>
        <input type="date" name="last_updated" required>

        <button type="submit">Predict Installs</button>
    </form>

    <h2>Predict High Performing App</h2>

    <form action="/predict_performance" method="POST">
        <label>Category</label>
        <input type="text" name="category" placeholder="GAME" required>

        <label>Size MB</label>
        <input type="number" step="0.1" name="size_mb" placeholder="25" required>

        <label>Price</label>
        <input type="number" step="0.01" name="price" placeholder="0" required>

        <label>Content Rating</label>
        <input type="text" name="content_rating" placeholder="Everyone" required>

        <label>Main Genre</label>
        <input type="text" name="main_genre" placeholder="Arcade" required>

        <label>Days Since Update</label>
        <input type="number" name="days_since_update" placeholder="100" required>

        <label>App Name Length</label>
        <input type="number" name="app_name_length" placeholder="15" required>

        <label>Genre Count</label>
        <input type="number" name="genre_count" placeholder="1" required>

        <label>Is Free</label>
        <select name="is_free">
            <option value="1">Free</option>
            <option value="0">Paid</option>
        </select>

        <button type="submit">Predict Performance</button>
    </form>

</div>

</body>
</html>
